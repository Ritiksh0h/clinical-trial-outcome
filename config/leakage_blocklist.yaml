# Conduct-accrued soft leakage (hard-blocklisted). These derive from AACT tables that
# accrue during the trial's life, so their values partly encode the outcome:
#   - number_of_facilities = COUNT(facilities table); sites open over conduct, WITHDRAWN → ~1
#   - num_countries / is_multinational = distinct countries (countries table `removed` flag =
#     post-registration edits); WITHDRAWN → ~1 country.
# Confirmed by impact test: dropping facilities cost only 0.04 Phase III PR-AUC (not
# load-bearing). See reports/facilities_leak_check.md. Same treatment as ACTUAL enrollment.
aact_conduct_accrued_soft_leak:
  - number_of_facilities
  - num_countries
  - is_multinational

# Conditional soft-leakage rule (enforced in build.py, NOT by column name).
# `enrollment` is used ONLY where enrollment_type == "ESTIMATED" (planned, registration-time).
# `enrollment` where enrollment_type == "ACTUAL" is completion-time — soft leakage (a low
# actual enrollment is partly a consequence of early termination, which correlates with the
# label) — and is never used: _compute_enrollment_log() gates on ESTIMATED, NaN otherwise.
# This is a string, not a list, so the loader does NOT add it as a hard column name — the raw
# `enrollment` column is legitimately consumed to build enrollment_log, and blocklisting the
# name would make drop_leakage_columns() delete it and re-break the feature.
enrollment_conditional_note: "enrollment_log = ESTIMATED rows only; ACTUAL excluded as soft leakage. Enforced by _compute_enrollment_log (build.py) + test_estimated_enrollment_only (test_leakage.py)."

# AACT result tables — never query these for features
aact_result_tables:
